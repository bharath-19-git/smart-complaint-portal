<!DOCTYPE html>
<html>
<head>
    <title>Citizen Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Citizen Login</h1>

    <input type="email"
           id="email"
           placeholder="Enter Email">

    <input type="password"
           id="password"
           placeholder="Enter Password">

    <button onclick="loginCitizen()">
        Login
    </button>

    <button onclick="registerCitizen()">
        Register
    </button>
    <p id="message"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
